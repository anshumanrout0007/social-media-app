services:
  - type: web
    name: pixel-social
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT core.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: pixel-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pixel-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: pixel-social.onrender.com

databases:
  - name: pixel-db
    databaseName: pixel
    user: pixel_user

  - name: pixel-redis
    type: redis